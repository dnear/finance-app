{% extends "base.html" %}
{% block title %}Transfer Antar Dompet{% endblock %}
{% block content %}
<div id="skeleton-transfer" aria-hidden="true">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
</div>

<div id="transfer-content" style="display:none;">
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-arrow-left-right me-2"></i>Transfer Antar Dompet
            </div>
            <div class="card-body">
                <form method="post" id="transfer-form">
                    <div class="mb-3">
                        <label for="from_wallet" class="form-label fw-semibold">Dari Dompet</label>
                        <select class="form-select" id="from_wallet" name="from_wallet" required>
                            <option value="">-- Pilih Dompet Asal --</option>
                            {% for w in wallets %}
                                <option value="{{ w.id }}">{{ w.name }} (Rp {{ "{:,.0f}".format(w.balance) }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="to_wallet" class="form-label fw-semibold">Ke Dompet</label>
                        <select class="form-select" id="to_wallet" name="to_wallet" required>
                            <option value="">-- Pilih Dompet Tujuan --</option>
                            {% for w in wallets %}
                                <option value="{{ w.id }}">{{ w.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount_display" class="form-label fw-semibold">Jumlah Transfer</label>
                        <div class="input-group">
                            <input type="hidden" id="amount_raw" name="amount" value="0">
                            <input type="text" class="form-control" id="amount_display" name="amount_display" data-rupiah data-rupiah-prefix="true" data-raw-target="#amount_raw" inputmode="numeric" autocomplete="off" placeholder="Rp 0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="fee_display" class="form-label fw-semibold">Biaya Transfer (opsional)</label>
                        <div class="input-group">
                            <input type="hidden" id="fee_raw" name="fee" value="0">
                            <input type="text" class="form-control" id="fee_display" name="fee_display" data-rupiah data-rupiah-prefix="true" data-raw-target="#fee_raw" inputmode="numeric" autocomplete="off" placeholder="Rp 0">
                        </div>
                        <small class="text-muted">Biaya akan dikurangkan dari dompet asal</small>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label fw-semibold">Deskripsi (opsional)</label>
                        <input type="text" class="form-control" id="description" name="description" placeholder="Misal: Transfer bulanan">
                    </div>
                    <button type="submit" id="transfer-btn" class="btn btn-primary w-100">
                        <span id="transfer-text"><i class="bi bi-send"></i> Transfer</span>
                        <span id="transfer-loading" style="display:none;">⏳ Memproses...</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</div>

<script>
// Mencegah memilih dompet yang sama
document.getElementById('from_wallet').addEventListener('change', function() {
    let fromVal = this.value;
    let toSelect = document.getElementById('to_wallet');
    Array.from(toSelect.options).forEach(option => {
        if (option.value === fromVal) {
            option.disabled = true;
        } else {
            option.disabled = false;
        }
    });
});

const transferForm = document.querySelector('#transfer-form');
const transferBtn = document.getElementById('transfer-btn');
const transferText = document.getElementById('transfer-text');
const transferLoading = document.getElementById('transfer-loading');
const amountRaw = document.getElementById('amount_raw');
const feeRaw = document.getElementById('fee_raw');
const feeDisplay = document.getElementById('fee_display');

if (feeDisplay) {
    feeDisplay.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9Rp .]/g, '');
    });
}

if (transferForm) {
    transferForm.addEventListener('submit', function (event) {
        if (amountRaw && !amountRaw.value) {
            event.preventDefault();
            return;
        }

        if (feeRaw && !feeRaw.value) feeRaw.value = 0;

        transferBtn.disabled = true;
        transferText.style.display = 'none';
        transferLoading.style.display = 'inline';
    });
}
</script>
{% endblock %}
