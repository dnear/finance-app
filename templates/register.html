<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6" id="theme-color-meta">
    <title>Daftar - Finance App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text: #1e293b;
        }
        [data-theme="dark"] {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text: #e2e8f0;
        }
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            background: var(--card-bg);
            color: var(--text);
        }
        .theme-toggle-btn {
            position: fixed;
            top: 14px;
            right: 14px;
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        [data-theme="dark"] .form-control {
            background-color: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        [data-theme="dark"] a,
        [data-theme="dark"] label,
        [data-theme="dark"] h5,
        [data-theme="dark"] p {
            color: #e2e8f0;
        }
    </style>
    <script>
        (function () {
            var savedTheme = localStorage.getItem('finance-theme');
            var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', savedTheme || (systemDark ? 'dark' : 'light'));
        })();
    </script>
</head>
<body>
    <button type="button" class="theme-toggle-btn" id="themeToggle" aria-label="Toggle dark mode"><i class="bi bi-moon-stars-fill"></i></button>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Finance App</h4>
                    </div>
                    <div class="card-body p-4">
                        <h5 class="text-center mb-4">Daftar Akun Baru</h5>
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="alert alert-danger">
                                    {{ messages[0] }}
                                </div>
                            {% endif %}
                        {% endwith %}
                        <form method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirm" class="form-label">Konfirmasi Password</label>
                                <input type="password" class="form-control" id="confirm" name="confirm" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Daftar</button>
                        </form>
                        <p class="text-center mt-3">
                            Sudah punya akun? <a href="{{ url_for('login') }}">Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        (function () {
            const storageKey = 'finance-theme';
            const btn = document.getElementById('themeToggle');
            const root = document.documentElement;
            const metaTheme = document.getElementById('theme-color-meta');
            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                if (metaTheme) metaTheme.setAttribute('content', theme === 'dark' ? '#0f172a' : '#3b82f6');
                if (btn) btn.innerHTML = theme === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-stars-fill"></i>';
            }
            applyTheme(root.getAttribute('data-theme'));
            btn.addEventListener('click', function () {
                const next = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
                localStorage.setItem(storageKey, next);
                applyTheme(next);
            });
        })();
    </script>
</body>
</html>
